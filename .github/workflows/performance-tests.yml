---
name: Performance Testing

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    # Run weekly on Monday at 2am UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Need history for comparison

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: perf-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            perf-${{ runner.os }}-${{ matrix.python-version }}-
            perf-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Run performance benchmark
        run: |
          python tools/benchmark_plugins.py --iterations 3 --output benchmark-py${{ matrix.python-version }}.json

      - name: Compare with baseline (if exists)
        continue-on-error: true
        run: |
          if [ -f benchmarks/baseline-py${{ matrix.python-version }}.json ]; then
            python tools/compare_benchmarks.py \
              benchmarks/baseline-py${{ matrix.python-version }}.json \
              benchmark-py${{ matrix.python-version }}.json \
              --threshold 20
          else
            echo "No baseline found for Python ${{ matrix.python-version }}"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-py${{ matrix.python-version }}
          path: benchmark-py${{ matrix.python-version }}.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const benchmarkFile = 'benchmark-py${{ matrix.python-version }}.json';

            if (!fs.existsSync(benchmarkFile)) {
              console.log('Benchmark file not found');
              return;
            }

            const data = JSON.parse(fs.readFileSync(benchmarkFile, 'utf8'));
            const stats = data.statistics;

            const comment = `
            ## Performance Benchmark Results (Python ${{ matrix.python-version }})

            | Metric | Value |
            |--------|-------|
            | Average Time | ${stats.avg_time.toFixed(3)}s |
            | Min Time | ${stats.min_time.toFixed(3)}s |
            | Max Time | ${stats.max_time.toFixed(3)}s |
            | Iterations | ${data.iterations} |

            <details>
            <summary>Full Results</summary>

            \`\`\`json
            ${JSON.stringify(data, null, 2)}
            \`\`\`

            </details>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
